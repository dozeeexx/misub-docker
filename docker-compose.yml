services:
  misub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misub-docker
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_PATH: ${DATABASE_PATH:-/data/misub.db}
      CRON_ENABLED: ${CRON_ENABLED:-true}
      CRON_INTERVAL_SECONDS: ${CRON_INTERVAL_SECONDS:-86400}
      CRON_RUN_ON_START: ${CRON_RUN_ON_START:-false}
    ports:
      - "${PORT:-8787}:8787"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/_health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
